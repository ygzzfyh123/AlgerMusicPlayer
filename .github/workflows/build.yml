name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 5.1.2)'
        required: false
        default: 'latest'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows
            os: windows-latest
            build_command: npm run build:win
          - id: mac
            os: macos-latest
            build_command: npm run build:mac
          - id: linux
            os: ubuntu-latest
            build_command: npm run build:linux
          - id: android
            os: ubuntu-latest
            build_command: "" # Android 有特殊的构建逻辑

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.id == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Linux build dependencies
        if: matrix.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf

      - name: Build Android APK
        if: matrix.id == 'android'
        run: |
          npm run build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build Desktop artifacts
        if: matrix.id != 'android'
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}-build-artifacts
          if-no-files-found: warn
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
            dist/latest*.yml
            android/app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # AlgerMusic v5.1.2 - 移动端独立版本
          
          ## 新增功能
          - ✅ 移动端完全独立化，所有 API 嵌入前端
          - ✅ 无需依赖外部服务器
          - ✅ 官方服务器到期不影响使用
          - ✅ 请求缓存机制，节省流量
          - ✅ 自动重试和容错能力
          
          ## 下载
          - **Windows**: `AlgerMusicPlayer-*.exe`
          - **macOS**: `AlgerMusicPlayer-*.dmg`
          - **Linux**: `algermusic-*.AppImage`
          - **Android**: `AlgerMusicPlayer-v5.1.2.apk`
          
          ## 更新说明
          详见 [MOBILE_STANDALONE_README.md](https://github.com/ygzzfyh123/AlgerMusicPlayer/blob/main/MOBILE_STANDALONE_README.md)
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          tag_name: v5.1.2
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
