name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 5.1.2)'
        required: false
        default: 'latest'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows
            os: windows-latest
            build_command: npm run build:win
          - id: mac
            os: macos-latest
            build_command: npm run build:mac
          - id: linux
            os: ubuntu-latest
            build_command: npm run build:linux
          - id: android
            os: ubuntu-latest
            build_command: "" # Android 有特殊的构建逻辑

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.id == 'android'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "========== 环境检查 =========="
          echo "Node 版本: $(node --version)"
          echo "npm 版本: $(npm --version)"
          if [ "${{ matrix.id }}" == "android" ]; then
            echo "Java 版本: $(java -version 2>&1 | head -n 1)"
          fi
          echo "========== 安装依赖 =========="
          npm install --legacy-peer-deps
          echo "✅ 依赖安装完成"

      - name: Install Linux build dependencies
        if: matrix.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf

      - name: Build Android APK
        if: matrix.id == 'android'
        run: |
          echo "========== 开始前端编译 =========="
          npm run build
          if [ ! -d "out/renderer" ]; then
            echo "❌ 前端编译失败: out/renderer 目录不存在"
            ls -la out/ 2>/dev/null || echo "out 目录不存在"
            exit 1
          fi
          echo "✅ 前端编译成功"
          echo "========== 同步 Capacitor =========="
          npx cap sync android || exit 1
          echo "✅ Capacitor 同步成功"
          echo "========== 检查 Android 文件 =========="
          ls -la android/app/src/main/assets/public/ || echo "assets 目录不存在"
          echo "========== 编译 APK =========="
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease || {
            echo "❌ Gradle 编译失败"
            echo "========== 错误日志 =========="
            exit 1
          }
          echo "✅ APK 编译成功"

      - name: Build Desktop artifacts
        if: matrix.id != 'android'
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}-build-artifacts
          if-no-files-found: warn
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
            dist/latest*.yml
            android/app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # AlgerMusic v5.1.2 - 移动端独立版本
          
          ## 新增功能
          - ✅ 移动端完全独立化，所有 API 嵌入前端
          - ✅ 无需依赖外部服务器
          - ✅ 官方服务器到期不影响使用
          - ✅ 请求缓存机制，节省流量
          - ✅ 自动重试和容错能力
          
          ## 下载
          - **Windows**: `AlgerMusicPlayer-*.exe`
          - **macOS**: `AlgerMusicPlayer-*.dmg`
          - **Linux**: `algermusic-*.AppImage`
          - **Android**: `AlgerMusicPlayer-v5.1.2.apk`
          
          ## 更新说明
          详见 [MOBILE_STANDALONE_README.md](https://github.com/ygzzfyh123/AlgerMusicPlayer/blob/main/MOBILE_STANDALONE_README.md)
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          # 使用触发时的 tag（如推送 vX.Y.Z）或 workflow_dispatch 输入的 version
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
